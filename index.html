<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini App Gateway</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            text-align: center;
        }
        .container { padding: 20px; }
        .spinner {
            border: 4px solid rgba(0, 0, 0, 0.1);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border-left-color: var(--tg-theme-button-color, #3390ec);
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <div class="spinner" id="spinner"></div>
        <h2 id="status">Loading App...</h2>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const tg = window.Telegram.WebApp;
            // Expand the web app to full screen
            tg.expand();
            
            // Get the startapp parameter from Telegram
            const startParam = tg.initDataUnsafe?.start_param;
            
            if (startParam) {
                try {
                    // Base64Url decode logic (convert to regular Base64)
                    let b64 = startParam.replace(/-/g, '+').replace(/_/g, '/');
                    // Add padding if required
                    while (b64.length % 4 !== 0) {
                        b64 += '=';
                    }
                    
                    // Decode string to get the original URL
                    const decodedUrl = decodeURIComponent(escape(atob(b64)));
                    
                    if (decodedUrl.startsWith('http://') || decodedUrl.startsWith('https://')) {
                        document.getElementById('status').innerText = 'Redirecting...';
                        window.location.replace(decodedUrl);
                    } else {
                        throw new Error('Invalid URL protocol. Must be HTTP/HTTPS.');
                    }
                } catch(e) {
                    console.error(e);
                    document.getElementById('spinner').style.display = 'none';
                    document.getElementById('status').innerText = 'Invalid link parameter.';
                }
            } else {
                document.getElementById('spinner').style.display = 'none';
                document.getElementById('status').innerText = 'Welcome to the App. No link provided to load.';
            }
        });
    </script>
</body>
</html>
